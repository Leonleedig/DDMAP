<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>分院活動使用空間一覽</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<style>
  :root {
    --primary-color: #e0e0e0;
    --text-muted: #888888;
    --free-color: #374151;   
    --booked-color: #9f1239; 
    --bg-color: #121212;     
    --panel-bg: #1e1e1e;     
    --border-color: #333333; 
    --floor-h: 500px; 
  }

  body {
    font-family: 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
    background-color: var(--bg-color);
    margin: 0;
    padding: 0;
    color: var(--primary-color);
    overflow: hidden;
  }

  #viewer-mode {
    display: block; 
    height: 100vh;
    width: 100vw;
    position: relative;
  }
  #designer-mode, #data-view-mode { 
    display: none; 
    height: 100vh; 
    width: 100vw; 
    background: var(--bg-color); 
    flex-direction: column; 
  }

  .left-panel {
    position: absolute;
    left: 10vw;
    top: 10vh;
    width: 34vw; 
    min-width: 320px;
    height: 80vh;
    box-sizing: border-box;
    background: transparent;
    padding: 140px 30px 40px 30px; 
    border-right: none;
    z-index: 100;
    display: flex;
    flex-direction: column;
    gap: 20px;
    overflow: hidden; 
    pointer-events: none; 
  }

  .left-panel > * { pointer-events: auto; }

  /* --- 數位時鐘 --- */
  .datetime-display {
    position: absolute;
    top: 0px;
    left: 30px;
    width: 17vw; 
    z-index: 200;
    pointer-events: auto;
  }
  .clock-time {
    display: flex;
    justify-content: space-between;
    font-family: Arial, sans-serif;
    font-weight: 500;
    font-size: 10vh; 
    color: var(--primary-color);
    line-height: 1;
  }
  .clock-date {
    display: flex;
    justify-content: space-between;
    font-family: Arial, sans-serif;
    font-weight: normal;
    font-size: 3vh; 
    color: var(--text-muted);
    margin-top: 5px; 
    line-height: 1;
  }

  .control-group { display: flex; flex-direction: column; gap: 8px; }

  .form-control {
    padding: 10px;
    background: rgba(255, 255, 255, 0.04);
    color: var(--primary-color);
    border: none;
    border-radius: 4px;
    font-size: 15px;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.2s;
  }

  .form-control:focus { outline: none; background: rgba(255, 255, 255, 0.08); }
  .btn-primary { background: rgba(255, 255, 255, 0.08); color: var(--primary-color); border: none; font-weight: normal; text-align: center; }
  .btn-primary:hover { background: rgba(255, 255, 255, 0.15); }
  .btn-success { background: #276749; color: white; border: none; }
  .btn-danger { background: #742a2a; color: white; border: none; }

  /* 左側：詳細資訊卡片 */
  .info-card {
    display: flex;
    flex-direction: column;
    flex: 1;
    overflow-y: auto;
  }
  .info-card::before, .info-card::after { content: ''; margin: auto; }
  .info-card h3 { margin: 0 0 20px 0; color: #ffffff; font-size: 2vh; font-weight: 500; }
  .info-detail { display: flex; flex-direction: column; gap: 6px; margin-bottom: 25px; }
  .info-detail:last-child { margin-bottom: 0; }
  .info-label { font-size: 1.5vh; color: var(--text-muted); }
  .info-value { font-size: 2vh; color: var(--primary-color); }
  .info-value.remarks { font-size: 2vh; line-height: 1.6; color: #bbbbbb; }

  .back-btn {
    background: transparent;
    border: none;
    color: var(--text-muted);
    padding: 0;
    font-size: 3vh;
    cursor: pointer;
    text-align: left;
    margin-bottom: 30px;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: color 0.2s;
  }
  .back-btn:hover { color: var(--primary-color); }

  /* 左側：活動列表容器 */
  .activity-list-container {
    display: flex;
    flex-direction: column;
    flex: 1; 
    overflow: hidden;
  }

  .activity-list {
    margin: auto 0;
    max-height: 80%;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    padding-right: 5px;
  }
  .activity-list::-webkit-scrollbar { width: 4px; }
  .activity-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  .activity-list-title {
    font-size: 4vh;
    color: #ffffff;
    font-weight: 400;
    margin: 0 0 10px 0;
    flex-shrink: 0;
  }

  .activity-btn {
    background: transparent;
    border: none;
    padding: 16px 0; 
    text-align: left;
    cursor: pointer;
    color: var(--text-muted);
    display: flex;
    flex-direction: row;     
    align-items: baseline;   
    gap: 15px;
    transition: color 0.2s;
  }
  .activity-btn:hover { color: #ffffff; }
  .activity-btn.active-item { color: #ffffff; }
  .activity-btn-time { 
    font-size: 2vh; 
    font-weight: 250; 
    color: #ff8a8a;
    flex-shrink: 0; 
    width: 10vw; 
    transition: font-weight 0.2s, color 0.2s;
  }
  .activity-btn.active-item .activity-btn-time { font-weight: 200; }
  .activity-btn-title { font-size: 2vh; font-weight: normal; }

  .bottom-controls {
    display: flex;
    flex-direction: column;
    gap: 15px;
    padding-top: 20px;
    flex-shrink: 0;
  }

  /* 鄰近日期的三鈕導航 */
  .date-nav-group {
    display: flex;
    gap: 0;
    margin-top: 5px;
  }
  .btn-date-nav {
    flex: 1;
    padding: 4px 0;
    background: rgba(255, 255, 255, 0);
    color: var(--text-muted);
    border: 1px solid var(--border-color);
    font-size: 1.7vh;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .btn-date-nav:hover {
    background: rgba(255, 180, 210, 0.2);
    color: var(--primary-color);
    border-color: rgba(255, 255, 255, 1);
  }

  /* --- 客製化上拉式智慧月曆 --- */
  .calendar-popup {
    position: absolute;
    bottom: calc(100% + 10px);
    width: 29vw;
    background: #000000; /* 黑底 */
    border: 1px solid var(--border-color);
    padding: 1vh;
    border-radius: 8px;
    z-index: 300;
  }
  .calendar-nav { 
    display: flex; justify-content: space-between; align-items: center; 
    color: white; margin-bottom: 15px; font-weight: 300; font-size: 3vh;
  }
  .calendar-nav button { 
    background: rgba(255,255,255,0.1); border: none; color: white; cursor: pointer; 
    padding: 5px 12px; border-radius: 4px; font-size: 2vh; transition: background 0.2s;
  }
  .calendar-nav button:hover { background: rgba(255,255,255,0.25); }
  
  /* 新增：年份選擇器樣式 */
  .year-selector-btn {
    background: transparent;
    border: none;
    color: var(--primary-color);
    font-size: 1.5vh;
    font-weight: bold;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 4px;
    transition: background 0.2s;
    position: relative; /* 為了相對定位下拉選單 */
  }
  .year-selector-btn:hover { background: rgba(255, 255, 255, 0.1); }
  
  .year-dropdown {
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    background: var(--panel-bg);
    border: 1px solid var(--border-color);
    border-radius: 4px;
    max-height: 150px;
    overflow-y: auto;
    z-index: 310;
    display: none; /* 預設隱藏 */
    box-shadow: 0 4px 8px rgba(0,0,0,0.5);
    flex-direction: column;
    min-width: 80px;
  }
  .year-dropdown.show { display: flex; }
  .year-option {
    padding: 8px 12px;
    color: var(--primary-color);
    cursor: pointer;
    text-align: center;
    font-size: 1.5vh;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
  }
  .year-option:hover { background: rgba(255, 255, 255, 0.1); }
  .year-option:last-child { border-bottom: none; }

  .calendar-grid { 
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 1vh; text-align: center; 
  }
  .day-name { font-size: 2vh; color: #888888; margin-bottom: 1vh; }
  .calendar-cell { 
    padding: .3vh 0; font-size: 2vh; cursor: pointer; border-radius: 100%;
    width: 1.8vw; height: 1.5vw; display: flex; align-items: center; justify-content: center;
    margin: auto; transition: background 0.2s, transform 0.1s;
  }
  .calendar-cell:hover { background: rgba(255,255,255,0.15); transform: scale(1.1); }
  
  /* 月曆文字顏色編碼 */
  .cell-gray { color: #888888; }
  .cell-white { color: #ffffff; font-weight: bold; }
  .cell-red { color: #ff4d4d; font-weight: bold; }
  .cell-selected { border: 1px solid rgba(255,255,255,0.5); background: rgba(255,255,255,0.05); }

  /* 右側：樓層透視視圖 */
  .right-panel {
    position: absolute;
    right: 0;
    top: 0;
    width: 66vw;  
    height: 100vh;
    background: transparent; 
    padding: 0; 
    display: flex;
    flex-direction: column;
    align-items: center;     
    justify-content: center; 
    overflow: hidden; 
    z-index: 1; 
  }

  .floor-container {
    width: 45%; 
    min-width: 320px;
    position: relative;
    margin-top: calc(var(--floor-h) * -0.90); 
    transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
    pointer-events: none; 
    opacity: 1;
  }

  .floor-container:first-child { margin-top: 0 !important; }

  #floorPlansContainer.has-expanded .floor-container { margin-top: calc(var(--floor-h) * -1) !important; }
  #floorPlansContainer.has-expanded .floor-container:first-child { margin-top: 0 !important; }
  #floorPlansContainer.has-expanded .floor-container:not(.active) { opacity: 0; pointer-events: none; }
  
  #floorPlansContainer.has-expanded .floor-container.active {
    opacity: 1;
    z-index: 1000 !important;
  }

  .floor-title-3d {
    position: absolute;
    left: -60px; 
    top: 50%;
    transform: translateY(-50%);
    font-size: 5vh;
    font-weight: 700;
    color: #ffffff; 
    letter-spacing: 2px;
    transition: transform 0.3s ease, font-size 0.4s ease;
    pointer-events: auto; 
    cursor: pointer;      
    z-index: 10000;        
  }
  .floor-container.active .floor-title-3d { font-size: 32px; }

  .svg-3d-wrapper {
    transform: rotateX(55deg) rotateZ(-30deg);
    transform-style: preserve-3d;
    transition: transform 0.6s ease, opacity 0.6s ease;
    background: transparent;
    padding: 5vh;
    opacity: 0.5;
    pointer-events: auto; 
  }

  .floor-container.active .svg-3d-wrapper {
    opacity: 1 !important; 
    transform: rotateX(50deg) rotateZ(-30deg) translateZ(30px) translateY(-15px);
  }

  svg { width: 100%; height: auto; display: block; }
  .space { transition: fill 0.3s ease, filter 0.2s ease; cursor: default; }
  .floor-container.active .space { cursor: pointer; }
  .status-free { fill: var(--free-color); }
  .status-booked { fill: var(--booked-color); }

  .space-label {
    fill: #ffffff; font-size: 1.5vh; font-weight: normal; text-anchor: middle;
    dominant-baseline: middle; pointer-events: none; opacity: 0; transition: opacity 0.4s ease;
  }
  .space-sublabel {
    fill: #aaaaaa; font-size: 1vh; font-weight: 100; text-anchor: middle;
    dominant-baseline: middle; pointer-events: none; opacity: 0; transition: opacity 0.4s ease;
  }
  .floor-container.active .space-label, .floor-container.active .space-sublabel { opacity: 1; }

  /* 共用標頭樣式 (供設計器、檢視表使用) */
  .view-header { background: var(--panel-bg); padding: 15px 30px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; z-index: 100; flex-shrink: 0; }
  .view-header h2 { margin: 0; font-size: 18px; color: var(--primary-color); font-weight: normal; }
  .view-body { display: flex; flex: 1; overflow: hidden; }

  /* 設計者模式專屬樣式 */
  .designer-sidebar { width: 300px; background: var(--panel-bg); border-right: 1px solid var(--border-color); padding: 20px; overflow-y: auto; }
  .designer-canvas-container { flex: 1; display: flex; justify-content: center; align-items: center; background: var(--bg-color); padding: 20px; overflow: auto; }
  .edit-canvas-wrapper { width: 300px; height: 600px; background-color: #1e1e1e; position: relative; background-image: linear-gradient(#2a2a2a 1px, transparent 1px), linear-gradient(90deg, #2a2a2a 1px, transparent 1px); background-size: 30px 30px; border-radius: 8px; overflow: hidden; border: 1px solid #333; }
  #designerSvg { width: 100%; height: 100%; display: block; cursor: crosshair; }
  .design-rect { fill: rgba(255, 255, 255, 0.1); stroke: #555; stroke-width: 1; cursor: grab; }
  .design-rect:active { cursor: grabbing; }
  .design-rect.active { fill: rgba(255, 255, 255, 0.2); stroke: #888; stroke-dasharray: 4,4; }
  .design-text { fill: #ccc; font-size: 8px; font-weight: normal; text-anchor: middle; dominant-baseline: middle; pointer-events: none; }
  .resize-handle { fill: #333; stroke: #888; stroke-width: 1; cursor: nwse-resize; }
  .hidden { display: none !important; }

  /* 清洗後資料檢視表專屬樣式 */
  .data-table-container { flex: 1; padding: 20px; overflow: auto; background: var(--bg-color); }
  .data-table { width: 100%; border-collapse: collapse; color: var(--primary-color); font-size: 14px; text-align: left; }
  .data-table th { background: var(--panel-bg); padding: 15px 12px; position: sticky; top: 0; z-index: 10; border-bottom: 2px solid var(--border-color); color: #ffffff; font-weight: 500;}
  .data-table td { padding: 12px 12px; border-bottom: 1px solid var(--border-color); vertical-align: middle; }
  .data-table tr:hover { background: rgba(255, 255, 255, 0.03); }
  .space-badge { background: var(--free-color); color: white; padding: 3px 8px; border-radius: 4px; font-size: 12px; margin-right: 4px; margin-bottom: 4px; display: inline-block;}
  .space-badge-container { display: flex; flex-wrap: wrap; }
  
  .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center; z-index: 10000; }
  .modal-content { background: var(--panel-bg); padding: 25px 30px; border-radius: 4px; width: auto; min-width: 300px; max-width: 400px; text-align: center; border: 1px solid var(--border-color); }
  .modal-content h3 { margin-top: 0; color: var(--primary-color); font-size: 18px; font-weight: normal; }
  .modal-content p { color: var(--text-muted); line-height: 1.5; margin-bottom: 20px; font-size: 14px;}
  .modal-actions { display: flex; justify-content: center; gap: 15px; }
</style>
</head>
<body>

<div id="viewer-mode" class="main-layout">
  <div class="left-panel">
    
    <!-- 數位時鐘與日期 -->
    <div class="datetime-display">
      <div class="clock-time" id="clockTime"></div>
      <div class="clock-date" id="clockDate"></div>
    </div>

    <!-- 左側動態資訊卡片 (互斥切換) -->
    <div id="spaceDetailCard" class="info-card hidden">
      <button class="back-btn" onclick="showActivityListPanel()">◀ 返回活動列表</button>
      <h3 id="infoLocation">請選擇空間</h3>
      <div class="info-detail">
        <span class="info-label">活動名稱</span>
        <span id="infoActivity" class="info-value">--</span>
      </div>
      <div class="info-detail">
        <span class="info-label">活動時間</span>
        <span id="infoTime" class="info-value">--</span>
      </div>
      <div class="info-detail">
        <span class="info-label">預約人/備註</span>
        <span id="infoRemarks" class="info-value remarks">--</span>
      </div>
    </div>

    <!-- 活動列表容器 (互斥切換) -->
    <div id="activityListContainer" class="activity-list-container">
      <div id="activityList" class="activity-list">
        <!-- 標題緊貼清單，並一起置中捲動 -->
        <h3 id="activityListTitle" class="activity-list-title">連線載入中...</h3>
        <div id="activityListItems"></div>
      </div>
    </div>

    <!-- 底部控制項 (包含新版智慧選單) -->
    <div class="bottom-controls">
      <div class="control-group" style="position: relative;">
        <!-- 與標籤同列的選擇觸發按鈕 -->
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <label style="margin: 0; font-size: 2vh; font-weight: 300; color: var(--primary-color);">選擇日期</label>
          <button id="dateTriggerBtn" class="form-control" style="width: auto; padding: 6px 12px; font-size: 15px; background: transparent; border: 1px solid var(--border-color); color: var(--primary-color);" onclick="toggleCalendar()">
            <span id="dateTriggerBtnText">載入中...</span>
            <span id="dateTriggerIcon" style="margin-left: 6px; font-size: 10px; color: var(--text-muted);">▲</span>
          </button>
        </div>
        
        <!-- 上拉式客製化月曆 Popup -->
        <div id="calendarPopup" class="calendar-popup hidden">
          <div class="calendar-nav">
            <button onclick="changeCalendarMonth(-1)">前月</button>
            <div style="display: flex; align-items: center; justify-content: center; position: relative;">
              <!-- 年份選擇器按鈕 -->
              <button id="yearSelectorBtn" class="year-selector-btn" onclick="toggleYearDropdown(event)">
                 <span id="calendarYearText"></span><span style="font-size:10px; margin-left:2px;">▼</span>
              </button>
              <!-- 隱藏的年份下拉選單 -->
              <div id="yearDropdown" class="year-dropdown">
                 <!-- JS 動態生成 -->
              </div>
              <span id="calendarMonthText" style="margin-left: 4px; font-size: 16px;"></span>
            </div>
            <button onclick="changeCalendarMonth(1)">次月</button>
          </div>
          <div class="calendar-grid" id="calendarGrid">
            <!-- JS 動態生成按週排列之日期 -->
          </div>
        </div>

        <div class="date-nav-group">
          <button class="btn-date-nav" onclick="changeDateOffset(-1)">◀前一日</button>
          <button class="btn-date-nav" onclick="changeDateOffset(0)">今日</button>
          <button class="btn-date-nav" onclick="changeDateOffset(1)">後一日▶</button>
        </div>
      </div>
      <div id="adminPanel" class="control-group" style="display: none; margin-top: 5px;">
        <button onclick="toggleDesignerMode(true)" class="form-control btn-primary">進入場地設計器</button>
        <button onclick="toggleDataViewMode(true)" class="form-control btn-primary">檢視清洗後資料表</button>
      </div>
    </div>
  </div>

  <div class="right-panel" id="floorPlansContainer"></div>
</div>

<div id="designer-mode">
  <div class="view-header">
    <h2>場地劃分設計工具</h2>
    <div>
      <button onclick="exportJSON()" class="form-control btn-primary" style="margin-right: 10px;">輸出 JSON 結構</button>
      <button onclick="toggleDesignerMode(false)" class="form-control btn-success">儲存並返回檢視</button>
    </div>
  </div>
  <div class="view-body">
    <div class="designer-sidebar">
      <div class="control-group" style="margin-bottom: 20px;">
        <label>選擇編輯樓層</label>
        <select id="floorSelector" class="form-control" onchange="loadFloorToEditor()">
          <option value="4F">4F</option>
          <option value="3F">3F</option>
          <option value="2F">2F</option>
          <option value="1F">1F</option>
        </select>
      </div>
      <div class="control-group" style="margin-bottom: 20px;">
        <button onclick="addNewSpace()" class="form-control btn-primary">新增空間區塊</button>
      </div>
      <div id="propertiesPanel" class="hidden">
        <h3 style="border-bottom: 1px solid var(--border-color); padding-bottom: 10px; font-weight: normal; font-size: 16px;">區塊屬性設定</h3>
        <div class="control-group">
          <label>場地代號 (ID)</label>
          <input type="text" id="propId" class="form-control" oninput="updateActiveSpaceProp('id', this.value)">
        </div>
        <div class="control-group">
          <label>場地名稱</label>
          <input type="text" id="propName" class="form-control" oninput="updateActiveSpaceProp('name', this.value)">
        </div>
        <div style="display:flex; gap:10px; margin-top:10px;">
          <div class="control-group" style="flex:1;">
            <label>寬度</label>
            <input type="number" id="propW" class="form-control" oninput="updateActiveSpaceProp('width', parseInt(this.value))">
          </div>
          <div class="control-group" style="flex:1;">
            <label>長度</label>
            <input type="number" id="propH" class="form-control" oninput="updateActiveSpaceProp('height', parseInt(this.value))">
          </div>
        </div>
        <button type="button" onclick="deleteActiveSpace(event)" class="form-control btn-danger" style="margin-top: 25px;">刪除此區塊</button>
      </div>
      <div id="noSelectionMsg" style="color:var(--text-muted); margin-top:20px; font-size: 14px;">請在右側畫布點選區塊編輯，或直接拖曳調整大小與位置。</div>
    </div>
    <div class="designer-canvas-container">
      <div class="edit-canvas-wrapper">
        <svg id="designerSvg" viewBox="0 0 200 400"></svg>
      </div>
    </div>
  </div>
</div>

<div id="data-view-mode">
  <div class="view-header">
    <h2>後台系統：已清洗文字資料檢視表</h2>
    <div>
      <button onclick="toggleDataViewMode(false)" class="form-control btn-success">返回主儀表板</button>
    </div>
  </div>
  <div class="data-table-container">
    <table class="data-table" id="dataTable">
      <thead>
        <tr>
          <th width="10%">日期</th>
          <th width="12%">活動時間</th>
          <th width="20%">活動名稱</th>
          <th width="15%">原始地點輸入</th>
          <th width="25%">系統轉換場地 (Space IDs)</th>
          <th width="18%">預約人 / 備註</th>
        </tr>
      </thead>

      </tbody>

  </div>
</div>

<div id="customModal" class="modal-overlay hidden">
  <div class="modal-content">
    <h3 id="modalTitle">提示</h3>
    <p id="modalMessage">訊息內容</p>
    <div class="modal-actions">
      <button id="modalBtnCancel" class="form-control btn-danger hidden" style="width: auto; padding: 6px 20px;">取消</button>
      <button id="modalBtnConfirm" class="form-control btn-primary" style="width: auto; padding: 6px 20px;">確定</button>
    </div>
  </div>
</div>

<script>
  let floorLayoutConfig = [
    {
      "level": "4F",
      "viewBox": "0 0 200 400",
      "spaces": [
        { "id": "4F-Top", "name": "寮房", "x": 0, "y": 0, "width": 200, "height": 170 },
        { "id": "4F-Mid", "name": "歡喜地", "x": 25, "y": 170, "width": 150, "height": 160 }
      ]
    },
    {
      "level": "3F",
      "viewBox": "0 0 200 400",
      "spaces": [
        { "id": "3F-Top", "name": "大殿", "x": 0, "y": 0, "width": 200, "height": 170 },
        { "id": "3F-BR", "name": "大殿外廊", "x": 60, "y": 170, "width": 85, "height": 230 }
      ]
    },
    {
      "level": "2F",
      "viewBox": "0 0 200 400",
      "spaces": [
        { "id": "2F-Big", "name": "藝文走廊", "x": 0, "y": 0, "width": 75, "height": 230 },
        { "id": "2F-SmallA", "name": "法堂二", "x": 75, "y": 0, "width": 125, "height": 95 },
        { "id": "2F-SmallB", "name": "法堂一", "x": 75, "y": 95, "width": 125, "height": 135 },
        { "id": "2F-New4", "name": "辦公室", "x": 0, "y": 230, "width": 200, "height": 170 }
      ]
    },
    {
      "level": "1F",
      "viewBox": "0 0 200 400",
      "spaces": [
        { "id": "1F-A", "name": "齋堂", "x": 55, "y": 65, "width": 145, "height": 135 },
        { "id": "1F-B", "name": "大寮", "x": 0, "y": 0, "width": 200, "height": 65 },
        { "id": "1F-New3", "name": "知客", "x": 70, "y": 200, "width": 130, "height": 200 },
        { "id": "1F-New4", "name": "輕食區", "x": 0, "y": 200, "width": 70, "height": 200 }
      ]
    }
  ];

  let allSheetData = []; 
  let currentDayActivities = [];
  let currentSelectedIndex = 0;
  
  // 全域變數：追蹤目前選擇的日期與月曆視圖
  let globalSelectedDateStr = "";
  let calendarViewDate = new Date();

  function extractSpaceIds(rawLocation) {
    if (!rawLocation) return [];
    const loc = String(rawLocation).toLowerCase();
    const ids = new Set();

    if (loc.includes("全區1-4") || loc.includes("1-4樓") || loc.includes("全棟") || loc.includes("一到四樓") || loc === "全區") {
      floorLayoutConfig.forEach(floor => floor.spaces.forEach(s => ids.add(s.id)));
      return Array.from(ids);
    }

    if (loc.includes("齋堂")) ids.add("1F-A");
    if (loc.includes("大寮")) ids.add("1F-B");
    if (loc.includes("知客")) ids.add("1F-New3");
    if (loc.includes("輕食")) ids.add("1F-New4");

    if (loc.includes("法堂一二") || loc.includes("法堂12")) {
      ids.add("2F-SmallA"); ids.add("2F-SmallB");
    } else {
      if (loc.includes("法堂二") || loc.includes("法堂2")) ids.add("2F-SmallA");
      if (loc.includes("法堂一") || loc.includes("法堂1")) ids.add("2F-SmallB");
      if (loc.includes("法堂") && !loc.includes("法堂一") && !loc.includes("法堂二") && !loc.includes("法堂1") && !loc.includes("法堂2")) {
        ids.add("2F-SmallB");
      }
    }
    if (loc.includes("走廊") || loc.includes("藝文")) ids.add("2F-Big");
    if (loc.includes("辦公")) ids.add("2F-New4");

    if (loc.includes("外廊") || loc.includes("大殿外")) ids.add("3F-BR");
    let tempLoc = loc.replace(/大殿外廊/g, "").replace(/大殿外/g, "");
    if (tempLoc.includes("大殿")) ids.add("3F-Top");

    if (loc.includes("寮房") || loc.includes("住宿")) ids.add("4F-Top");
    if (loc.includes("歡喜地")) ids.add("4F-Mid");

    return Array.from(ids);
  }

  // ==========================================
  // 更新數位時鐘邏輯 (Flexbox 自動齊行魔法)
  // ==========================================
  function updateClock() {
    const now = new Date();
    const hh = String(now.getHours()).padStart(2, '0');
    const mm = String(now.getMinutes()).padStart(2, '0');
    const yyyy = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, '0');
    const dd = String(now.getDate()).padStart(2, '0');

    const timeStr = `${hh}:${mm}`;
    const dateStr = `${yyyy}/${month}/${dd}`;

    const timeEl = document.getElementById('clockTime');
    const dateEl = document.getElementById('clockDate');
    
    if (timeEl) timeEl.innerHTML = timeStr.split('').map(c => `<span>${c}</span>`).join('');
    if (dateEl) dateEl.innerHTML = dateStr.split('').map(c => `<span>${c}</span>`).join('');
  }

  updateClock();
  setInterval(updateClock, 1000);

  // ==========================================
  // 解析線上 Excel (帶入破除快取機制)
  // ==========================================
  async function fetchOnlineExcel() {
    const fileId = '1Qejre9LK6vA-mt9y4nvn8A6C2pcqhHHd5Dt4my80jkw';
    const timestamp = new Date().getTime(); // 產生唯一時間戳，強制破除快取
    const exportUrl = `https://docs.google.com/spreadsheets/d/${fileId}/export?format=csv&t=${timestamp}`;

    const proxies = [
      `https://corsproxy.io/?${encodeURIComponent(exportUrl)}`,
      `https://api.allorigins.win/raw?url=${encodeURIComponent(exportUrl)}`,
      exportUrl 
    ];

    let csvText = null;

    try {
      for (const url of proxies) {
        try {
          const response = await fetch(url);
          if (response.ok) {
            csvText = await response.text();
            if (csvText && csvText.length > 50 && !csvText.includes('<html')) {
              break; 
            }
          }
        } catch (e) {
          console.warn(`嘗試連線失敗，切換節點：${url}`);
        }
      }

      if (!csvText || csvText.length < 50 || csvText.includes('<html')) {
        throw new Error('無法取得正確的 CSV 資料，可能被阻擋或是檔案不公開。');
      }
      
      const workbook = XLSX.read(csvText, { type: 'string' });
      const worksheet = workbook.Sheets[workbook.SheetNames[0]];
      
      const rawData = XLSX.utils.sheet_to_json(worksheet, { header: "A", raw: false, defval: "" });
      const cleanedData = [];

      rawData.forEach((row, index) => {
        let rawDate = String(row['A'] || '').trim();
        let parsedDate = new Date(rawDate);
        
        if (isNaN(parsedDate.getTime()) || rawDate.length < 5) return; 
        
        let yyyy = parsedDate.getFullYear();
        let mm = String(parsedDate.getMonth() + 1).padStart(2, '0');
        let dd = String(parsedDate.getDate()).padStart(2, '0');
        let standardDate = `${yyyy}/${mm}/${dd}`;

        let rawTime = String(row['B'] || '').trim();
        let timeStr = rawTime.replace(/上午|下午|早上|中午|晚上|半|點|分|\s+/g, ''); 
        const timeRegex = /(\d{1,2})[:：]?(\d{2})?[~\-到至]+(\d{1,2})[:：]?(\d{2})?/;
        const match = timeStr.match(timeRegex);

        if (!match) return; 

        let sh = parseInt(match[1], 10);
        let sm = match[2] ? parseInt(match[2], 10) : 0;
        let eh = parseInt(match[3], 10);
        let em = match[4] ? parseInt(match[4], 10) : 0;
        
        let startNum = sh + (sm / 60);
        let endNum = eh + (em / 60);

        let activityName = String(row['C'] || '未命名活動').trim();
        let rawLocation = String(row['D'] || '').trim();
        let remarks = String(row['E'] || '').trim();

        let matchedSpaceIds = extractSpaceIds(rawLocation);

        if (matchedSpaceIds.length > 0) {
          cleanedData.push({
            date: standardDate,
            ids: matchedSpaceIds, 
            start: startNum,
            end: endNum,
            status: 'booked',
            activityName: activityName,
            remarks: remarks,
            rawLocation: rawLocation 
          });
        }
      });

      allSheetData = cleanedData;

      // 如果月曆處於開啟狀態，同步更新月曆上的紅字狀態
      const popup = document.getElementById('calendarPopup');
      if (popup && !popup.classList.contains('hidden')) {
         renderCalendar();
      }

    } catch (error) {
      console.error('連線發生錯誤：', error);
      document.getElementById('activityListTitle').textContent = "連線失敗，請檢查權限";
      allSheetData = []; 
    }
  }

  function showModal(title, message, isConfirm = false, onConfirm = null) {
    document.getElementById('modalTitle').innerHTML = title;
    document.getElementById('modalMessage').innerHTML = message;
    const overlay = document.getElementById('customModal');
    const btnCancel = document.getElementById('modalBtnCancel');
    const btnConfirm = document.getElementById('modalBtnConfirm');
    overlay.classList.remove('hidden');
    btnCancel.onclick = () => { overlay.classList.add('hidden'); };
    if (isConfirm) {
      btnCancel.classList.remove('hidden');
      btnConfirm.onclick = () => { overlay.classList.add('hidden'); if(onConfirm) onConfirm(); };
    } else {
      btnCancel.classList.add('hidden');
      btnConfirm.onclick = () => { overlay.classList.add('hidden'); };
    }
  }

  function updateFloorOverlap() {
    const firstFloor = document.querySelector('.floor-container');
    if (firstFloor) {
      const h = firstFloor.offsetHeight;
      document.documentElement.style.setProperty('--floor-h', `${h}px`);
    }
  }

  function showActivityListPanel() {
    document.getElementById('spaceDetailCard').classList.add('hidden');
    document.getElementById('activityListContainer').classList.remove('hidden');
  }

  function showSpaceDetailsPanel(locationName, activityName, timeStr, remarksStr) {
    document.getElementById('infoLocation').textContent = locationName;
    document.getElementById('infoActivity').textContent = activityName;
    document.getElementById('infoTime').textContent = timeStr;
    document.getElementById('infoRemarks').textContent = remarksStr || '無其他備註';
    
    document.getElementById('activityListContainer').classList.add('hidden');
    document.getElementById('spaceDetailCard').classList.remove('hidden');
  }

  function toggleFloorFocus(container) {
    const isActive = container.classList.contains('active');
    const parentNode = document.getElementById('floorPlansContainer');

    document.querySelectorAll('.floor-container').forEach(el => el.classList.remove('active'));
    
    if (!isActive) {
      container.classList.add('active');
      parentNode.classList.add('has-expanded');
    } else {
      parentNode.classList.remove('has-expanded');
    }
    
    showActivityListPanel();
  }

  function expandFloorByLevel(levelStr) {
    if (!levelStr) return;
    const titles = document.querySelectorAll('.floor-title-3d');
    const parentNode = document.getElementById('floorPlansContainer');
    
    document.querySelectorAll('.floor-container').forEach(el => el.classList.remove('active'));

    titles.forEach(title => {
      if (title.textContent === levelStr) {
        const container = title.closest('.floor-container');
        container.classList.add('active');
        parentNode.classList.add('has-expanded');
      }
    });
  }

  function renderFloorPlans() {
    const container = document.getElementById('floorPlansContainer');
    let htmlContent = '';
    let zIndexCounter = 100;

    floorLayoutConfig.forEach(floor => {
      let spacesSVG = `<rect x="0" y="0" width="200" height="400" rx="8" fill="#252525" />`;
      
      floor.spaces.forEach(space => {
        const centerX = space.x + (space.width / 2);
        const centerY = space.y + (space.height / 2);
        spacesSVG += `
          <rect id="rect-${space.id}" class="space status-free" 
                x="${space.x}" y="${space.y}" width="${space.width}" height="${space.height}" rx="2" 
                data-name="${space.name}" />
          <text class="space-label" x="${centerX}" y="${centerY - 8}">${space.name}</text>
          <text id="text-${space.id}" class="space-sublabel" x="${centerX}" y="${centerY + 12}">無活動</text>
        `;
      });

      htmlContent += `
        <div class="floor-container">
          <div class="floor-title-3d" onclick="toggleFloorFocus(this.closest('.floor-container'))">${floor.level}</div>
          <div class="svg-3d-wrapper" style="z-index: ${zIndexCounter};">
            <svg viewBox="${floor.viewBox}">${spacesSVG}</svg>
          </div>
        </div>
      `;
      zIndexCounter -= 10;
    });
    
    container.innerHTML = htmlContent;
    bindViewerInteractiveEvents();
    requestAnimationFrame(() => updateFloorOverlap());
  }

  // ==========================================
  // 上拉式智慧月曆功能邏輯與年份跳轉
  // ==========================================
  function toggleCalendar() {
    const popup = document.getElementById('calendarPopup');
    const icon = document.getElementById('dateTriggerIcon');
    if (popup.classList.contains('hidden')) {
      // 準備打開，將視圖初始化至當前選定之月份
      const parts = globalSelectedDateStr.split('/');
      calendarViewDate = new Date(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, 1);
      renderCalendar();
      popup.classList.remove('hidden');
      icon.textContent = '▼';
    } else {
      // 關閉
      popup.classList.add('hidden');
      icon.textContent = '▲';
      document.getElementById('yearDropdown').classList.remove('show');
    }
  }

  function changeCalendarMonth(offset) {
    calendarViewDate.setMonth(calendarViewDate.getMonth() + offset);
    renderCalendar();
  }

  // 打開或關閉年份下拉選單
  function toggleYearDropdown(event) {
    if (event) event.stopPropagation(); // 阻止事件冒泡
    const dropdown = document.getElementById('yearDropdown');
    dropdown.classList.toggle('show');
    
    // 如果打開下拉選單，則動態生成年份選項 (前後10年)
    if (dropdown.classList.contains('show')) {
        const currentYear = calendarViewDate.getFullYear();
        let html = '';
        for(let y = currentYear - 10; y <= currentYear + 10; y++) {
             html += `<div class="year-option" onclick="selectYear(${y}, event)">${y}年</div>`;
        }
        dropdown.innerHTML = html;
        
        // 自動捲動到目前的年份
        setTimeout(() => {
            const options = dropdown.querySelectorAll('.year-option');
            const targetOption = Array.from(options).find(opt => opt.textContent === `${currentYear}年`);
            if (targetOption) {
                targetOption.scrollIntoView({ block: "center" });
            }
        }, 10);
    }
  }

  // 使用者點選年份後觸發
  function selectYear(year, event) {
      if (event) event.stopPropagation();
      calendarViewDate.setFullYear(year);
      document.getElementById('yearDropdown').classList.remove('show');
      renderCalendar();
  }

  // 點擊月曆其他地方時，自動關閉年份下拉選單
  document.addEventListener('click', function(event) {
      const yearBtn = document.getElementById('yearSelectorBtn');
      const yearDropdown = document.getElementById('yearDropdown');
      if (yearBtn && yearDropdown && !yearBtn.contains(event.target) && !yearDropdown.contains(event.target)) {
          yearDropdown.classList.remove('show');
      }
  });

  function renderCalendar() {
    const grid = document.getElementById('calendarGrid');
    
    const yyyy = calendarViewDate.getFullYear();
    const mm = calendarViewDate.getMonth();
    
    // 更新年份按鈕與月份文字
    document.getElementById('calendarYearText').textContent = `${yyyy}年`;
    document.getElementById('calendarMonthText').textContent = `${mm + 1}月`;
    
    const dayNames = ['日', '一', '二', '三', '四', '五', '六'];
    let html = dayNames.map(d => `<div class="day-name">${d}</div>`).join('');
    
    const firstDay = new Date(yyyy, mm, 1).getDay();
    const daysInMonth = new Date(yyyy, mm + 1, 0).getDate();
    
    const activeDates = new Set(allSheetData.map(d => d.date));
    
    const today = new Date();
    const todayStr = `${today.getFullYear()}/${String(today.getMonth() + 1).padStart(2, '0')}/${String(today.getDate()).padStart(2, '0')}`;

    for (let i = 0; i < firstDay; i++) {
        html += `<div class="calendar-cell" style="visibility: hidden;"></div>`;
    }
    
    for (let i = 1; i <= daysInMonth; i++) {
        const dateStr = `${yyyy}/${String(mm + 1).padStart(2, '0')}/${String(i).padStart(2, '0')}`;
        let classes = ['calendar-cell'];
        
        if (activeDates.has(dateStr)) {
            classes.push('cell-red');    // 有活動：亮紅字
        } else if (dateStr === todayStr) {
            classes.push('cell-white');  // 今天：白字
        } else {
            classes.push('cell-gray');   // 其他無活動：灰字
        }

        if (dateStr === globalSelectedDateStr) {
            classes.push('cell-selected');
        }
        
        html += `<div class="${classes.join(' ')}" onclick="selectCalendarDate('${dateStr}')">${i}</div>`;
    }
    grid.innerHTML = html;
  }

  function selectCalendarDate(dateStr) {
    globalSelectedDateStr = dateStr;
    document.getElementById('dateTriggerBtnText').textContent = globalSelectedDateStr;
    
    // 選取後自動收合月曆
    const popup = document.getElementById('calendarPopup');
    popup.classList.add('hidden');
    document.getElementById('dateTriggerIcon').textContent = '▲';
    document.getElementById('yearDropdown').classList.remove('show');
    
    updateActivityTitleByDate();
    renderActivityList();
    showActivityListPanel();
  }

  // 變更日期的導航按鈕邏輯
  function changeDateOffset(offset) {
    let targetDateStr = "";
    if (offset === 0) {
      const now = new Date();
      const yyyy = now.getFullYear();
      const mm = String(now.getMonth() + 1).padStart(2, '0');
      const dd = String(now.getDate()).padStart(2, '0');
      targetDateStr = `${yyyy}/${mm}/${dd}`;
    } else {
      if (!globalSelectedDateStr) return; 
      const parts = globalSelectedDateStr.split('/');
      const currentDate = new Date(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, parseInt(parts[2], 10));
      currentDate.setDate(currentDate.getDate() + offset);
      
      const yyyy = currentDate.getFullYear();
      const mm = String(currentDate.getMonth() + 1).padStart(2, '0');
      const dd = String(currentDate.getDate()).padStart(2, '0');
      targetDateStr = `${yyyy}/${mm}/${dd}`;
    }

    // 透過共用介面切換日期並更新
    selectCalendarDate(targetDateStr);
  }

  function renderActivityList() {
    const listContainer = document.getElementById('activityListItems');
    listContainer.innerHTML = '';
    
    const selectedDateStr = globalSelectedDateStr;

    currentDayActivities = allSheetData.filter(item => {
      if (!item.date) return true; 
      return item.date === selectedDateStr;
    }).sort((a, b) => a.start - b.start);

    if (currentDayActivities.length === 0) {
      listContainer.innerHTML = `
        <div style="color:var(--text-muted); padding:10px 0; line-height: 1.6; font-size: 2vh; ">
          該日無排程<br>
          <small style="opacity: 0.6;">(${selectedDateStr})</small>
        </div>`;
      updateDashboard(-1);
      
      document.querySelectorAll('.floor-container').forEach(el => el.classList.remove('active'));
      document.getElementById('floorPlansContainer').classList.remove('has-expanded');
      return;
    }

    currentDayActivities.forEach((item, index) => {
      let floorLevel = item.ids.length > 0 ? item.ids[0].split('-')[0] : '';

      item._floorLevel = floorLevel;
      item._timeStr = `${formatTime(item.start)} - ${formatTime(item.end)}`;

      const btn = document.createElement('button');
      btn.className = 'activity-btn';
      btn.innerHTML = `
        <div class="activity-btn-time">${item._timeStr}</div>
        <div class="activity-btn-title">${item.activityName}</div>
      `;
      
      btn.onclick = () => {
        selectActivityByIndex(index, true); 
      };
      
      listContainer.appendChild(btn);
    });
    
    const now = new Date();
    const todayStr = `${now.getFullYear()}/${String(now.getMonth() + 1).padStart(2, '0')}/${String(now.getDate()).padStart(2, '0')}`;
    
    let targetIndex = 0; 
    
    if (selectedDateStr === todayStr) {
      const currentHour = now.getHours() + (now.getMinutes() / 60);
      for (let i = 0; i < currentDayActivities.length; i++) {
        if (currentHour >= currentDayActivities[i].start && currentHour < currentDayActivities[i].end) {
          targetIndex = i; 
          break;
        } else if (currentDayActivities[i].start > currentHour) {
          targetIndex = i; 
          break;
        }
        targetIndex = currentDayActivities.length - 1; 
      }
    }
    
    selectActivityByIndex(targetIndex, false);
    
    document.querySelectorAll('.floor-container').forEach(el => el.classList.remove('active'));
    document.getElementById('floorPlansContainer').classList.remove('has-expanded');
  }

  function selectActivityByIndex(index, autoExpand = true) {
    currentSelectedIndex = index;
    const item = currentDayActivities[index];
    if (!item) return;

    updateDashboard(item.start);

    document.querySelectorAll('.activity-btn').forEach((btn, i) => {
      if (i === index) btn.classList.add('active-item');
      else btn.classList.remove('active-item');
    });

    if (autoExpand) {
      expandFloorByLevel(item._floorLevel);
    }
    showActivityListPanel();
  }

  function formatTime(decimalTime) {
    const hours = Math.floor(decimalTime);
    const minutes = (decimalTime % 1 === 0.5) ? '30' : '00';
    return `${hours.toString().padStart(2, '0')}:${minutes}`;
  }

  function updateDashboard(selectedTime) {
    const spaces = document.querySelectorAll('.space');
    spaces.forEach(spaceRect => {
      const spaceId = spaceRect.id.replace('rect-', '');
      const textLabel = document.getElementById('text-' + spaceId);
      
      const booking = currentDayActivities.find(record => 
        record.ids.includes(spaceId) && selectedTime >= record.start && selectedTime < record.end
      );

      spaceRect.classList.remove('status-free', 'status-booked');

      if (booking) {
        spaceRect.classList.add('status-booked'); 
        textLabel.textContent = booking.activityName.substring(0, 5) + (booking.activityName.length > 5 ? '...' : '');
        
        spaceRect.setAttribute('data-status', 'booked');
        spaceRect.setAttribute('data-activity', booking.activityName);
        spaceRect.setAttribute('data-time', booking._timeStr);
        spaceRect.setAttribute('data-remarks', booking.remarks);
        spaceRect.setAttribute('data-raw-location', booking.rawLocation); 
      } else {
        spaceRect.classList.add('status-free');
        if(textLabel) textLabel.textContent = '無活動';
        spaceRect.removeAttribute('data-status');
        spaceRect.removeAttribute('data-raw-location');
      }
    });
  }

  function updateActivityTitleByDate() {
    const selected = globalSelectedDateStr; 
    let titleEl = document.getElementById('activityListTitle');
    if (!titleEl) return;
    
    const now = new Date();
    const todayStr = `${now.getFullYear()}/${String(now.getMonth() + 1).padStart(2, '0')}/${String(now.getDate()).padStart(2, '0')}`;

    if (selected === todayStr) {
      titleEl.textContent = '今日活動';
    } else {
      const parts = selected.split('/');
      if (parts.length === 3) {
        const mm = parseInt(parts[1], 10);
        const dd = parseInt(parts[2], 10);
        titleEl.textContent = `${mm}月${dd}日活動`;
      }
    }
  }

  function bindViewerInteractiveEvents() {
    document.querySelectorAll('.space').forEach(space => {
      space.addEventListener('click', function(e) {
        const floorContainer = this.closest('.floor-container');
        
        if (floorContainer.classList.contains('active') && this.getAttribute('data-status') === 'booked') {
          e.stopPropagation(); 
          
          const floorLevel = floorContainer.querySelector('.floor-title-3d').textContent;
          const name = this.getAttribute('data-name');
          const activity = this.getAttribute('data-activity');
          const time = this.getAttribute('data-time');
          const remarks = this.getAttribute('data-remarks');
          
          const rawLoc = this.getAttribute('data-raw-location');
          const displayLocation = rawLoc ? rawLoc : `${floorLevel} ${name}`;
          
          showSpaceDetailsPanel(displayLocation, activity, time, remarks);
        } else if (floorContainer.classList.contains('active')) {
           showActivityListPanel();
        }
      });
    });
  }

  // --- 設計者模式 ---
  let currentEditingFloorIndex = 0; let activeSpaceIndex = -1; let dragMode = null; let dragStartCoords = { x: 0, y: 0 }; let originalRectCoords = { x: 0, y: 0, w: 0, h: 0 };
  const designerSvg = document.getElementById('designerSvg'); const propPanel = document.getElementById('propertiesPanel'); const noSelMsg = document.getElementById('noSelectionMsg');

  function toggleDesignerMode(showDesigner) {
    document.getElementById('viewer-mode').style.display = showDesigner ? 'none' : 'block';
    document.getElementById('data-view-mode').style.display = 'none';
    document.getElementById('designer-mode').style.display = showDesigner ? 'flex' : 'none';
    if (showDesigner) { loadFloorToEditor(); } 
    else { 
      renderFloorPlans(); 
      if(currentDayActivities.length > 0) {
        selectActivityByIndex(currentSelectedIndex, false);
      }
    }
  }

  // --- 清洗後資料檢視表模式 ---
  function toggleDataViewMode(showView) {
    document.getElementById('viewer-mode').style.display = showView ? 'none' : 'block';
    document.getElementById('designer-mode').style.display = 'none';
    document.getElementById('data-view-mode').style.display = showView ? 'flex' : 'none';
    
    if (showView) {
      renderDataTable();
    } else {
      renderFloorPlans(); 
      if(currentDayActivities.length > 0) {
        selectActivityByIndex(currentSelectedIndex, false);
      }
    }
  }

  function renderDataTable() {
    const tbody = document.getElementById('dataTableBody');
    tbody.innerHTML = '';

    if (!allSheetData || allSheetData.length === 0) {
      tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:30px; color:var(--text-muted);">目前無清洗後的資料，可按 F12 打開 Console 檢查網路抓取狀態。</td></tr>`;
      return;
    }

    const sortedData = [...allSheetData].sort((a, b) => {
      if (a.date !== b.date) return a.date.localeCompare(b.date);
      return a.start - b.start;
    });

    sortedData.forEach(item => {
      const tr = document.createElement('tr');
      const timeStr = `${formatTime(item.start)} - ${formatTime(item.end)}`;
      
      let idsHtml = '';
      if (item.ids && item.ids.length > 0) {
        idsHtml = `<div class="space-badge-container">` + 
                  item.ids.map(id => `<span class="space-badge">${id}</span>`).join('') + 
                  `</div>`;
      } else {
        idsHtml = '<span style="color:#666;">(無配對)</span>';
      }

      tr.innerHTML = `
        <td>${item.date}</td>
        <td>${timeStr}</td>
        <td>${item.activityName}</td>
        <td style="color:#aaaaaa;">${item.rawLocation || '-'}</td>
        <td>${idsHtml}</td>
        <td>${item.remarks || '-'}</td>
      `;
      tbody.appendChild(tr);
    });
  }

  function getMousePosition(evt) { const CTM = designerSvg.getScreenCTM(); return { x: (evt.clientX - CTM.e) / CTM.a, y: (evt.clientY - CTM.f) / CTM.d }; }

  function loadFloorToEditor() {
    const levelStr = document.getElementById('floorSelector').value;
    currentEditingFloorIndex = floorLayoutConfig.findIndex(f => f.level === levelStr);
    activeSpaceIndex = -1; updatePropertiesPanel(); drawDesignerCanvas();
  }

  function drawDesignerCanvas() {
    designerSvg.innerHTML = ''; const floorData = floorLayoutConfig[currentEditingFloorIndex];
    const baseRect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    baseRect.setAttribute('x', 0); baseRect.setAttribute('y', 0); baseRect.setAttribute('width', 200); baseRect.setAttribute('height', 400); baseRect.setAttribute('rx', 8); baseRect.setAttribute('fill', '#252525');
    designerSvg.appendChild(baseRect);

    floorData.spaces.forEach((space, index) => {
      const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      rect.setAttribute('x', space.x); rect.setAttribute('y', space.y); rect.setAttribute('width', space.width); rect.setAttribute('height', space.height); rect.setAttribute('rx', 2);
      rect.setAttribute('class', `design-rect ${index === activeSpaceIndex ? 'active' : ''}`);
      rect.addEventListener('mousedown', (e) => startDrag(e, index, 'move'));
      const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      text.setAttribute('x', space.x + space.width / 2); text.setAttribute('y', space.y + space.height / 2); text.setAttribute('class', 'design-text'); text.textContent = space.name;
      g.appendChild(rect); g.appendChild(text);

      if (index === activeSpaceIndex) {
        const handle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        handle.setAttribute('cx', space.x + space.width); handle.setAttribute('cy', space.y + space.height); handle.setAttribute('r', 4); handle.setAttribute('class', 'resize-handle');
        handle.addEventListener('mousedown', (e) => startDrag(e, index, 'resize')); g.appendChild(handle);
      }
      designerSvg.appendChild(g);
    });
  }

  function startDrag(evt, index, mode) {
    evt.stopPropagation(); activeSpaceIndex = index; dragMode = mode;
    updatePropertiesPanel(); drawDesignerCanvas();
    const coords = getMousePosition(evt); dragStartCoords = { x: coords.x, y: coords.y };
    const space = floorLayoutConfig[currentEditingFloorIndex].spaces[activeSpaceIndex];
    originalRectCoords = { x: space.x, y: space.y, w: space.width, h: space.height };
    window.addEventListener('mousemove', handleDrag); window.addEventListener('mouseup', endDrag);
  }

  function handleDrag(evt) {
    if (!dragMode || activeSpaceIndex === -1) return;
    evt.preventDefault(); const coords = getMousePosition(evt);
    const dx = coords.x - dragStartCoords.x; const dy = coords.y - dragStartCoords.y;
    const space = floorLayoutConfig[currentEditingFloorIndex].spaces[activeSpaceIndex];
    const snap = 5;
    if (dragMode === 'move') {
      let newX = Math.round((originalRectCoords.x + dx) / snap) * snap; let newY = Math.round((originalRectCoords.y + dy) / snap) * snap;
      if (newX < 0) newX = 0; if (newY < 0) newY = 0;
      if (newX + space.width > 200) newX = 200 - space.width; if (newY + space.height > 400) newY = 400 - space.height;
      space.x = newX; space.y = newY;
    } else if (dragMode === 'resize') {
      let newW = Math.round((originalRectCoords.w + dx) / snap) * snap; let newH = Math.round((originalRectCoords.h + dy) / snap) * snap;
      if (newW < 10) newW = 10; if (newH < 10) newH = 10;
      if (space.x + newW > 200) newW = 200 - space.x; if (space.y + newH > 400) newH = 400 - space.y;
      space.width = newW; space.height = newH;
    }
    drawDesignerCanvas(); syncPropInputs(space);
  }

  function endDrag() { dragMode = null; window.removeEventListener('mousemove', handleDrag); window.removeEventListener('mouseup', endDrag); }
  designerSvg.addEventListener('mousedown', (e) => { if(e.target.id === 'designerSvg' || e.target.tagName.toLowerCase() === 'svg') { activeSpaceIndex = -1; updatePropertiesPanel(); drawDesignerCanvas(); } });

  function updatePropertiesPanel() {
    if (activeSpaceIndex === -1) { propPanel.classList.add('hidden'); noSelMsg.classList.remove('hidden'); } 
    else { propPanel.classList.remove('hidden'); noSelMsg.classList.add('hidden'); syncPropInputs(floorLayoutConfig[currentEditingFloorIndex].spaces[activeSpaceIndex]); }
  }

  function syncPropInputs(space) { document.getElementById('propId').value = space.id; document.getElementById('propName').value = space.name; document.getElementById('propW').value = space.width; document.getElementById('propH').value = space.height; }
  function updateActiveSpaceProp(key, value) {
    if (activeSpaceIndex === -1) return;
    const space = floorLayoutConfig[currentEditingFloorIndex].spaces[activeSpaceIndex];
    if (key === 'width' || key === 'height') { value = isNaN(value) || value < 10 ? 10 : value; }
    space[key] = value; drawDesignerCanvas();
  }

  function addNewSpace() {
    const floorData = floorLayoutConfig[currentEditingFloorIndex]; const newIdx = floorData.spaces.length + 1;
    floorData.spaces.push({ id: `${floorData.level}-New${newIdx}`, name: `新空間 ${newIdx}`, x: 50, y: 50, width: 80, height: 80 });
    activeSpaceIndex = floorData.spaces.length - 1; updatePropertiesPanel(); drawDesignerCanvas();
  }

  function deleteActiveSpace(e) {
    if (e) e.stopPropagation();
    if (activeSpaceIndex === -1) return;
    showModal('確認刪除', '確定要刪除此空間區塊嗎？', true, () => {
      floorLayoutConfig[currentEditingFloorIndex].spaces.splice(activeSpaceIndex, 1);
      activeSpaceIndex = -1; updatePropertiesPanel(); drawDesignerCanvas();
    });
  }

  function exportJSON() {
    const jsonStr = JSON.stringify(floorLayoutConfig, null, 2);
    showModal('匯出成功', '已在開發者工具 (Console) 中印出最新的 JSON 設定。<br>您可以複製並替換程式碼中的資料。');
    console.log("=== 請複製以下 JSON 取代程式碼中的 floorLayoutConfig ==="); console.log(jsonStr);
  }

  window.addEventListener('DOMContentLoaded', async () => {
    renderFloorPlans();
    
    // 初始化全域日期
    const now = new Date();
    const yyyy = now.getFullYear();
    const mm = String(now.getMonth() + 1).padStart(2, '0');
    const dd = String(now.getDate()).padStart(2, '0');
    globalSelectedDateStr = `${yyyy}/${mm}/${dd}`; 
    document.getElementById('dateTriggerBtnText').textContent = globalSelectedDateStr;

    await fetchOnlineExcel();
    
    updateActivityTitleByDate();
    renderActivityList();
    
    window.addEventListener('resize', updateFloorOverlap);

    setInterval(async () => {
      console.log("🔄 正在背景同步最新的試算表資料...");
      await fetchOnlineExcel();
      renderActivityList();
      if(document.getElementById('data-view-mode').style.display === 'flex') {
         renderDataTable();
      }
    }, 10 * 60 * 1000); 

    // 全域鍵盤事件監聽：方向鍵、全螢幕(F)與隱藏後台(O)
    document.addEventListener('keydown', (e) => {
      if (e.target.tagName.toLowerCase() === 'input' || e.target.tagName.toLowerCase() === 'textarea') return;
      
      if (e.key === 'o' || e.key === 'O') {
        const adminPanel = document.getElementById('adminPanel');
        adminPanel.style.display = (adminPanel.style.display === 'none') ? 'flex' : 'none';
      }

      if (e.key === 'f' || e.key === 'F') {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen().catch(err => console.warn(err));
        } else {
          if (document.exitFullscreen) {
            document.exitFullscreen();
          }
        }
      }

      if (['ArrowLeft', 'ArrowRight', 'ArrowUp'].includes(e.key)) {
        e.preventDefault(); 
        if (e.key === 'ArrowLeft') {
          changeDateOffset(-1); 
        } else if (e.key === 'ArrowRight') {
          changeDateOffset(1);  
        } else if (e.key === 'ArrowUp') {
          changeDateOffset(0);  
        }
      }
    });
  });

</script>
</body>
</html>
